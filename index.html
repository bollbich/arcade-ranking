<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking VR LEADERBOARD</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #000;
        background-image: url('arcade-bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: 'Press Start 2P', monospace;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        /* Efecto scanline opcional sobre todo */
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
    }

    /* La tabla en su propio contenedor flotante */
    .container { 
        max-width: 650px; width: 100%; 
        margin-top: 10vh; /* Centrado vertical un poco */
        /* Fondo semi-transparente para la tabla para que no choque con el fondo */
        background-color: rgba(0, 0, 0, 0.8);
        border: 4px solid #209cee; /* Borde de neón cian parpadeante */
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px #209cee; /* Brillo de neón */
        position: relative;
        z-index: 20;
    }
</style>
</head>
<body>

<div class="container nes-container is-dark with-title">
    <p class="title">TOP PLAYERS</p>
    
    <div class="nes-table-responsive">
        <table class="nes-table is-bordered is-dark">
            <thead>
                <tr>
                    <th>POS</th>
                    <th>NOMBRE</th>
                    <th>PUNTOS</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4" class="loading">LOADING DATA...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Importamos la librería oficial de Supabase para el navegador -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://dovdlxdcfeaitaqjwnvf.supabase.co/rest/v1/';
  const SUPABASE_ANON_KEY = 'sb_publishable_D8GrXKDEFt9ARRhq-2ae-w_HsH62NY5';

  // Inicializamos el cliente de Supabase
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    
    try {
      // Consultamos la tabla directamente
      const { data, error } = await supabase
        .from('ranking')
        .select('nombre, puntuacion, fecha')
        .order('puntuacion', { ascending: false })
        .limit(10);

      if (error) throw error;

      // Si no hay datos todavía
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">SIN PUNTUACIONES AÚN</td></tr>';
        return;
      }

      // Limpiamos el "Cargando..." e insertamos las filas
      tbody.innerHTML = '';
      data.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${row.nombre}</td>
          <td style="color: #00ff00;">${row.puntuacion}</td>
          <td style="color: #00bfff;">${row.fecha}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error(err);
      tbody.innerHTML = `<tr><td colspan="4" style="color: #ff0000; text-align:center;">ERROR: ${err.message}</td></tr>`;
    }
  }

  // Ejecutar al cargar la página
  document.addEventListener('DOMContentLoaded', loadLeaderboard);
</script>
</body>
</html>
