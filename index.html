<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking VR LEADERBOARD</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #000;
        background-image: url('arcade-bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: 'Press Start 2P', monospace;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        /* Efecto scanline opcional sobre todo */
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
    }

    /* La tabla en su propio contenedor flotante */
    .container { 
        max-width: 650px; width: 100%; 
        margin-top: 10vh; /* Centrado vertical un poco */
        /* Fondo semi-transparente para la tabla para que no choque con el fondo */
        background-color: rgba(0, 0, 0, 0.8);
        border: 4px solid #209cee; /* Borde de neón cian parpadeante */
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px #209cee; /* Brillo de neón */
        position: relative;
        z-index: 20;
    }
</style>
</head>
<body>

<div class="container nes-container is-dark with-title">
    <p class="title">TOP PLAYERS</p>
    
    <div class="nes-table-responsive">
        <table class="nes-table is-bordered is-dark">
            <thead>
                <tr>
                    <th>POS</th>
                    <th>NOMBRE</th>
                    <th>PUNTOS</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4" class="loading">LOADING DATA...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadRanking() {
        try {
            // Llama a nuestra función serverless oculta en Vercel
            const res = await fetch('/api/ranking'); 
            const data = await res.json();
            const tbody = document.getElementById('leaderboard-body');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">¡¡NADA QUE VER AUN!!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((player, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${player.nombre ? player.nombre.toUpperCase() : '???'}</td>
                    <td style="color: #92cc41">${player.puntuacion}</td>
                    <td style="color: #209cee">${player.fecha || '-'}</td>
                </tr>
            `).join('');
        } catch (err) {
            document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="4" style="color:#e76e55; text-align:center;">ERROR LOADING DATA</td></tr>';
        }
    }

    loadRanking();
</script>
</body>
</html>
