<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking VR LEADERBOARD</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #000;
        background-image: url('arcade-bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: 'Press Start 2P', monospace;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
    }

    .container, .admin-container { 
        width: max-content;
        margin-top: 5vh;
        background-color: rgba(0, 0, 0, 0.8);
        border: 4px solid #209cee;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px #209cee;
        position: relative;
        z-index: 20;
    }

    .admin-container {
        border-color: #92cc41;
        box-shadow: 0 0 20px #92cc41;
        margin-top: 30px;
        width: 100%;
        max-width: 580px;
    }
</style>
</head>
<body>

<div class="container nes-container is-dark with-title">
    <p class="title">TOP PLAYERS</p>
    
    <div class="nes-table-responsive">
        <table class="nes-table is-bordered is-dark">
            <thead>
                <tr>
                    <th>POS</th>
                    <th>NOMBRE</th>
                    <th>PUNTOS</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4" class="loading">LOADING DATA...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="admin-container nes-container is-dark with-title">
    <p class="title" style="color: #92cc41;">REGISTRAR PUNTOS</p>
    <form id="ranking-form">
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="form-nombre">JUGADOR (3 LETRAS):</label>
            <input type="text" id="form-nombre" class="nes-input is-dark" maxlength="3" required style="text-transform: uppercase;">
        </div>
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="form-puntos">PUNTOS:</label>
            <input type="number" id="form-puntos" class="nes-input is-dark" required>
        </div>
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="form-fecha">FECHA:</label>
            <input type="date" id="form-fecha" class="nes-input is-dark" required>
        </div>
        <div class="nes-field" style="margin-bottom: 20px;">
            <label for="form-password" style="color: #ff0055;">CÓDIGO DE CONTROL:</label>
            <input type="password" id="form-password" class="nes-input is-dark" placeholder="Clave del bar" required>
        </div>
        <button type="submit" class="nes-btn is-success" style="width: 100%;">GUARDAR RÉCORD</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://dovdlxdcfeaitaqjwnvf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_D8GrXKDEFt9ARRhq-2ae-w_HsH62NY5';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 1. CARGAR DATOS DE LA TABLA
  async function loadLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    if (!tbody) return;
    
    try {
      const { data, error } = await supabaseClient
        .from('ranking')
        .select('nombre, puntuacion, fecha')
        .order('puntuacion', { ascending: false })
        .limit(10);

      if (error) throw error;

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">SIN PUNTUACIONES AÚN</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      data.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${row.nombre}</td>
          <td style="color: #00ff00;">${row.puntuacion}</td>
          <td style="color: #00bfff;">${row.fecha}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error(err);
      tbody.innerHTML = `<tr><td colspan="4" style="color: #ff0000; text-align:center; padding: 20px;">ERROR: ${err.message}</td></tr>`;
    }
  }

  // 2. ENVIAR NUEVOS DATOS (CONTROL DE DUPLICADOS)
  document.getElementById('ranking-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nombre = document.getElementById('form-nombre').value.toUpperCase().trim();
    const puntuacion = parseInt(document.getElementById('form-puntos').value, 10);
    const fecha = document.getElementById('form-fecha').value;
    const password = document.getElementById('form-password').value;

    try {
      const authenticatedClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        global: { headers: { 'x-admin-password': password } }
      });

      // Buscamos si ya existe el nombre
      const { data: existente, error: errorBusqueda } = await authenticatedClient
        .from('ranking')
        .select('id, puntuacion')
        .eq('nombre', nombre)
        .maybeSingle();

      if (errorBusqueda) throw new Error("Error al consultar la base de datos.");

      if (existente) {
        // Actualizar solo si supera su vieja puntuación
        if (puntuacion > existente.puntuacion) {
          const { error: errorUpdate } = await authenticatedClient
            .from('ranking')
            .update({ puntuacion: puntuacion, fecha: fecha })
            .eq('id', existente.id);

          if (errorUpdate) throw new Error("Código incorrecto o fallo al actualizar.");
          alert('¡Récord personal superado y actualizado!');
        } else {
          alert(`El jugador ${nombre} ya tiene un récord mejor (${existente.puntuacion} pts). No se modifica.`);
        }
      } else {
        // Insertar de cero si es nuevo
        const { error: errorInsert } = await authenticatedClient
          .from('ranking')
          .insert([{ nombre, puntuacion, fecha }]);

        if (errorInsert) throw new Error("Código incorrecto o fallo al guardar.");
        alert('¡Nuevo jugador registrado con éxito!');
      }

      document.getElementById('ranking-form').reset();
      loadLeaderboard();

    } catch (err) {
      alert(err.message);
    }
  });

  document.addEventListener('DOMContentLoaded', loadLeaderboard);
</script>
</body>
</html>
