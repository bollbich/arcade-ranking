<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking VR LEADERBOARD</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #000;
        background-image: url('arcade-bg.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: 'Press Start 2P', monospace;
        padding: 10px;
        padding-bottom: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        position: relative;
        box-sizing: border-box;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
    }

    /* 1. EL CONTENEDOR GIGANTE: Ahora 100% transparente para ver el fondo arcade */
    .container { 
        width: 100%;
        max-width: 650px;
        margin-top: 3vh;
        background-color: transparent !important;
        border: 4px solid #209cee;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 0 20px #209cee;
        position: relative;
        z-index: 20;
        box-sizing: border-box;
    }

    /* PANEL DE ADMINISTRACIÓN (Mantiene fondo sólido para leer inputs) */
    .admin-container {
        width: 100%;
        max-width: 650px;
        margin-top: 20px;
        background-color: rgba(0, 0, 0, 0.95) !important;
        border: 4px solid #92cc41;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 0 20px #92cc41;
        position: relative;
        z-index: 20;
        box-sizing: border-box;
    }

    /* LOGO: Capa alta y libre para asegurar el triple clic */
    .logo-container {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-top: 10px;
        margin-bottom: 25px;
        position: relative;
        z-index: 99 !important;
    }

    .brand-logo {
        height: 120px;
        width: auto;
        display: block;
        cursor: pointer;
        pointer-events: auto !important;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent; 
    }

    .nes-table-responsive {
        width: 100%;
        overflow-x: visible !important;
        overflow-y: hidden;
    }

    /* 2. LA TABLA: Estructura transparente */
    .nes-table {
        width: 100%;
        font-size: 11px;
        background-color: transparent !important;
    }

    /* 3. LÍNEAS BLANCAS Y FILAS BLINDADAS: Aplicamos el fondo a la celda para no romper el borde */
    .nes-table.is-bordered th, 
    .nes-table.is-bordered td {
        border: 4px solid #ffffff !important; /* Fuerza a que la cuadrícula sea blanca */
        white-space: nowrap;
    }

    /* Fondo de las celdas de la cabecera */
    .nes-table thead th {
        background-color: rgba(0, 0, 0, 0.9) !important;
    }

    /* Fondo de las celdas de los registros de jugadores */
    .nes-table tbody td {
        background-color: rgba(0, 0, 0, 0.75) !important;
    }

    .login-modal {
        display: none;
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        background-color: #111;
        border: 4px solid #ba75ff;
        box-shadow: 0 0 30px #ba75ff;
        padding: 20px;
        width: 90%;
        max-width: 400px;
        box-sizing: border-box;
    }

    @media (max-width: 480px) {
        body {
            padding: 5px;
            padding-bottom: 40px;
        }

        .container, .admin-container {
            padding: 10px;
            margin-top: 45px;
        }

        .brand-logo {
            height: 85px; 
        }

        .nes-table {
            font-size: 8px;
        }

        .nes-table td, .nes-table th {
            padding: 6px 4px !important;
        }

        .nes-btn, label, .nes-input {
            font-size: 10px;
        }
    }
</style>
</head>
<body>

<div class="container nes-container is-dark">
    <div class="logo-container">
        <img src="LogoBodega.png" id="secret-trigger" class="brand-logo" alt="Logo Bodega">
    </div>
    
    <div class="nes-table-responsive">
        <table class="nes-table is-bordered is-dark">
            <thead>
                <tr>
                    <th>POS</th>
                    <th>NOMBRE</th>
                    <th>PUNTOS</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="4" class="loading">LOADING DATA...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="login-modal" class="login-modal nes-container is-dark with-title">
    <p class="title" style="color: #ba75ff;">ADMIN LOGIN</p>
    <form id="login-form">
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="login-email">EMAIL:</label>
            <input type="email" id="login-email" class="nes-input is-dark" required placeholder="admin@bodega.com">
        </div>
        <div class="nes-field" style="margin-bottom: 20px;">
            <label for="login-password">CONTRASEÑA:</label>
            <input type="password" id="login-password" class="nes-input is-dark" required placeholder="******">
        </div>
        <button type="submit" class="nes-btn is-primary" style="width: 100%; margin-bottom: 10px;">ENTRAR</button>
        <button type="button" class="nes-btn is-error" style="width: 100%;" onclick="cerrarLogin()">CANCELAR</button>
    </form>
</div>

<div id="admin-panel" class="admin-container nes-container is-dark with-title" style="display: none;">
    <p class="title" style="color: #92cc41;">REGISTRAR PUNTOS</p>
    <form id="ranking-form">
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="form-nombre">JUGADOR:</label>
            <input type="text" id="form-nombre" class="nes-input is-dark" maxlength="10" required style="text-transform: uppercase;">
        </div>
        <div class="nes-field" style="margin-bottom: 15px;">
            <label for="form-puntos">PUNTOS:</label>
            <input type="number" id="form-puntos" class="nes-input is-dark" required placeholder="Ej: 95500">
        </div>
        <div class="nes-field" style="margin-bottom: 20px;">
            <label for="form-fecha">FECHA:</label>
            <input type="date" id="form-fecha" class="nes-input is-dark" required>
        </div>
        <button type="submit" class="nes-btn is-success" style="width: 100%;">GUARDAR RÉCORD</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://dovdlxdcfeaitaqjwnvf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_D8GrXKDEFt9ARRhq-2ae-w_HsH62NY5';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function cerrarLogin() {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('login-form').reset();
  }

  // 1. CARGAR DATOS
  async function loadLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    if (!tbody) return;
    
    try {
      const { data, error } = await supabaseClient
        .from('ranking')
        .select('nombre, puntuacion, fecha')
        .order('puntuacion', { ascending: false })
        .limit(10);

      if (error) throw error;

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">SIN PUNTUACIONES AÚN</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      data.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${row.nombre}</td>
          <td style="color: #00ff00;">${parseInt(row.puntuacion).toLocaleString()}</td>
          <td style="color: #00bfff;">${row.fecha}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error(err);
      tbody.innerHTML = `<tr><td colspan="4" style="color: #ff0000; text-align:center; padding: 20px;">ERROR: ${err.message}</td></tr>`;
    }
  }

  // 2. PROCESAR LOGIN
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      alert("Acceso denegado: " + error.message);
    } else {
      cerrarLogin();
      document.getElementById('admin-panel').style.display = 'block';
      document.getElementById('form-fecha').valueAsDate = new Date();
    }
  });

  // 3. ENVIAR DATOS
  document.getElementById('ranking-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nombre = document.getElementById('form-nombre').value.toUpperCase().trim();
    const puncts = parseInt(document.getElementById('form-puntos').value);
    const fecha = document.getElementById('form-fecha').value;

    try {
      const { data: existente, error: errorBusqueda } = await supabaseClient
        .from('ranking')
        .select('id, puntuacion')
        .eq('nombre', nombre)
        .maybeSingle();

      if (errorBusqueda) throw new Error("Error al consultar la base de datos.");

      if (existente) {
        if (puncts !== parseInt(existente.puntuacion)) {
          const { error: errorUpdate } = await supabaseClient
            .from('ranking')
            .update({ puntuacion: puncts, fecha: fecha })
            .eq('id', existente.id);

          if (errorUpdate) throw new Error("Sesión caducada o sin permisos.");
          alert('¡Registro del jugador actualizado!');
        } else {
          alert(`El jugador ${nombre} ya tiene este registro guardado.`);
        }
      } else {
        const { error: errorInsert } = await supabaseClient
          .from('ranking')
          .insert([{ nombre, puntuacion: puncts, fecha }]);

        if (errorInsert) throw new Error("Sesión caducada o sin permisos.");
        alert('¡Nuevo jugador registrado con éxito!');
      }

      document.getElementById('ranking-form').reset();
      document.getElementById('admin-panel').style.display = 'none';
      loadLeaderboard();

    } catch (err) {
      alert(err.message);
    }
  });

  // ABRIR PANEL
  async function abrirPanelAdmin() {
    const panel = document.getElementById('admin-panel');
    const loginModal = document.getElementById('login-modal');
    
    if (panel.style.display === 'block' || loginModal.style.display === 'block') {
      panel.style.display = 'none';
      loginModal.style.display = 'none';
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();

    if (session) {
      panel.style.display = 'block';
      document.getElementById('form-fecha').valueAsDate = new Date();
    } else {
      loginModal.style.display = 'block';
      document.getElementById('login-email').focus();
    }
  }

  // Alt + P en PC
  document.addEventListener('keydown', async (e) => {
    if (e.altKey && e.key.toLowerCase() === 'p') {
      e.preventDefault();
      abrirPanelAdmin();
    }
  });

  // Triple toque en el logo
  let clicks = 0;
  let timeout;
  document.getElementById('secret-trigger').addEventListener('click', () => {
    clicks++;
    if (clicks === 1) {
      timeout = setTimeout(() => { clicks = 0; }, 2000);
    } else if (clicks === 3) {
      clearTimeout(timeout);
      clicks = 0;
      abrirPanelAdmin();
    }
  });

  document.addEventListener('DOMContentLoaded', loadLeaderboard);
</script>
</body>
</html>
